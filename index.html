<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>V-PAY</title><link rel='stylesheet' href='style.css'><script src='https://cdn.jsdelivr.net/npm/chart.js'></script></head><body><header class='header'><div class='container nav'><h2>V-PAY - Công cụ tính khoản vay</h2><a class='btn' href='#calculator'>Tính khoản vay</a></div></header><section class='hero'><h1>CÔNG CỤ TÍNH KHOẢN VAY THÔNG MINH</h1><p>Tính nhanh – Chính xác – Minh bạch</p></section><section class='container card' id='calculator'><div class='grid'><input id='loan' type='number' value='200000000'><input id='rate' type='number' value='7'><input id='months' type='number' value='12'><input id='date' type='date'></div><button class='btn full' onclick='calculate()'>TÍNH TOÁN</button><div class='stats'><div class='stat'>Tổng tiền lãi<br><span id='totalInterest'></span></div><div class='stat'>Tổng thanh toán<br><span id='totalPay'></span></div><div class='stat'>Gốc hàng tháng<br><span id='monthlyPrincipal'></span></div></div><canvas id='chart'></canvas><table id='tbl'><thead><tr><th>Kỳ</th><th>Ngày</th><th>Gốc</th><th>Lãi</th><th>Tổng</th><th>Dư nợ</th></tr></thead><tbody></tbody></table></section><script src='app.js'></script></body></html>
